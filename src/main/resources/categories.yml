settings:
  # Enable or disable the category system
  # If disabled, all items will be shown together without filtering
  enabled: true

  # Name of the "All" category
  all-category-name: "#0c1719Auction House"

# Blocks Category
blocks:
  display-name: "#0c1719Blocks"
  rules:
    # Match all block materials using Bukkit tag
    - type: tag
      tags:
        - BLOCKS # Custom tags, all minecraft blocks

# Weapons Category
weapons:
  display-name: "#0c1719Weapons"
  rules:
    # Match swords
    - type: material-suffix
      suffixes:
        - "_SWORD"
    # Match ranged weapons
    - type: material
      materials:
        - BOW
        - CROSSBOW
        - TRIDENT

# Armor Category
armor:
  display-name: "#0c1719Armor"
  rules:
    - type: material-suffix
      suffixes:
        - "_HELMET"
        - "_CHESTPLATE"
        - "_LEGGINGS"
        - "_BOOTS"
    - type: material
      materials:
        - ELYTRA
        - SHIELD
        - TURTLE_HELMET

# Tools Category
tools:
  display-name: "#0c1719Tools"
  rules:
    - type: material-suffix
      suffixes:
        - "_PICKAXE"
        - "_AXE"
        - "_SHOVEL"
        - "_HOE"
    - type: material
      materials:
        - SHEARS
        - FLINT_AND_STEEL
        - FISHING_ROD

# Consumables Category
consumables:
  display-name: "#0c1719Consumables"
  rules:
    - type: material
      materials:
        - POTION
        - SPLASH_POTION
        - LINGERING_POTION
        - GOLDEN_APPLE
        - ENCHANTED_GOLDEN_APPLE
        - COOKED_BEEF
        - COOKED_PORKCHOP
        - BREAD
        - CAKE
        - COOKIE
        - PUMPKIN_PIE

# Resources Category
resources:
  display-name: "#0c1719Resources"
  rules:
    - type: material
      materials:
        - COAL
        - IRON_INGOT
        - GOLD_INGOT
        - DIAMOND
        - EMERALD
        - NETHERITE_INGOT
        - LAPIS_LAZULI
        - REDSTONE
        - COPPER_INGOT
        - AMETHYST_SHARD
        - RAW_IRON
        - RAW_GOLD
        - RAW_COPPER

# Enchanted Books Category
enchanted-books:
  display-name: "#0c1719Enchanted Books"
  rules:
    - type: material
      materials:
        - ENCHANTED_BOOK

# Miscellaneous Category (Fallback)
# Items that don't match any other category will go here
misc:
  display-name: "#0c1719Miscellaneous"
  # No rules = fallback category for unmatched items
