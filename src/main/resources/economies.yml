economies:
  - type: VAULT
    is-enable: true
    name: vault
    display-name: "Vault"
    format: "%price%$"
    symbol: "v"
    # If true, money is delivered immediately. When false, players must run a claim command for pending balances.
    auto-claim: true
    # Allows giving the money to the player only if he is online, otherwise he should recover the pending money.
    must-be-online: false
    # permission: "zauctionhouse.economy.vault"
    withdraw-reason: "Purchase of %items% (zAuctionHouse)"
    deposit-reason: "Sale of %items% (zAuctionHouse)"
    price-format: PRICE_WITH_DECIMAL_FORMAT
    min-prices:
      auction: 10
      rent: 500
      bid: 500
    max-prices: 10000000000

    # Tax configuration
    # Types: SELL (seller pays when listing), PURCHASE (tax deducted from seller's earnings),
    #        BOTH (tax on both operations), CAPITALISM (VAT - buyer pays extra, seller receives full price)
    tax:
      enabled: false
      type: SELL  # SELL, PURCHASE, BOTH, CAPITALISM
      amount-type: PERCENTAGE  # PERCENTAGE or FIXED
      amount: 5  # 5% or 5$ depending on amount-type

      # Permission to bypass all taxes
      bypass-permission: "zauctionhouse.tax.bypass"

      # Tax reductions based on permissions (first matching permission is applied)
      reductions:
        - permission: "zauctionhouse.tax.vip"
          percentage: 50  # 50% reduction
        - permission: "zauctionhouse.tax.premium"
          percentage: 25  # 25% reduction
        - permission: "zauctionhouse.tax.member"
          percentage: 10  # 10% reduction

      # Item-specific tax rules (optional, disabled by default)
      # These rules override the default tax configuration for matching items
      item-rules:
        enabled: false
        rules: []
        # Example rules:
        # - name: "diamond_tax"
        #   priority: 100
        #   type: PURCHASE
        #   amount-type: PERCENTAGE
        #   amount: 10
        #   rule:
        #     type: material
        #     materials:
        #       - DIAMOND
        #       - DIAMOND_BLOCK
        #
        # - name: "rare_items"
        #   priority: 90
        #   type: CAPITALISM
        #   amount-type: PERCENTAGE
        #   amount: 15
        #   rule:
        #     type: and
        #     rules:
        #       - type: lore
        #         mode: CONTAINS
        #         values:
        #           - "Rare"

default-economy:
  auction: vault
  rent: vault
  bid: vault

price-decimal-format: '#,###.#'

price-reductions:
  - format: "#.#"
    max-amount: 1000
  - format: "%.1fK"
    max-amount: 1000000
  - format: "%.1fM"
    max-amount: 1000000000
  - format: "%.1fB"
    max-amount: 1000000000000
  - format: "%.2fT"
    max-amount: 1000000000000000
    display: "<green>%amount%"
  - format: "%.2fQ"
    max-amount: 100000000000000000
    display: "<red>%amount%"
