################################################################################################################################
#
#   zAuctionHouse V4 - Admin Transactions Inventory
#
#   Inventory นี้ใช้แสดงประวัติธุรกรรม (transaction history) ของผู้เล่น
#   แต่ละธุรกรรมคือดีลการขายที่เสร็จสมบูรณ์ พร้อมรายละเอียดด้านการเงิน
#
#   TRANSACTION STATUS:
#   - PENDING: ผู้ขายยังไม่ได้กดรับเงิน / เงินยังไม่ถูกโอนให้ผู้ขาย
#   - RETRIEVED: ผู้ขายกดรับเงินแล้ว / เงินถูกโอนให้ผู้ขายเรียบร้อย
#
#   FEATURES:
#   - ดูธุรกรรมทั้งหมดที่เสร็จสมบูรณ์แล้ว
#   - กรองตามสถานะธุรกรรม (transaction status)
#   - กรองตามช่วงเวลา (date range)
#   - ดูข้อมูลผู้ซื้อและผู้ขายในแต่ละดีล
#
#   ACCESS:
#   - เปิดจากหน้า admin history main → ปุ่ม Transactions
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าสูงสุด
name: '#0c1719Admin transactions (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า admin history main
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงรายการธุรกรรม (TRANSACTION ENTRIES DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงธุรกรรมทั้งหมดของผู้เล่นเป้าหมาย

  items:
    # ประเภทปุ่ม - ใช้แสดง transaction entries
    type: ZAUCTIONHOUSE_ADMIN_TRANSACTIONS

    # ช่องสำหรับแสดงสถานะกำลังโหลด
    loading-slot: 22

    # ช่องสำหรับแสดงธุรกรรม (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ไอเทมที่ใช้แสดงระหว่างกำลังโหลด
    item:
      material: BARRIER
      name: "#ff0000กำลังโหลด..."

    # ไอเทมที่ใช้แสดงเมื่อไม่มีธุรกรรมเลย
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nไม่พบประวัติการขาย'
        lore:
          - ''
          - '&7คุณยังไม่มีประวัติการขายไอเทมใด ๆ'

  #---------------------------------------------------------------------------
  # ปุ่มกรองตามสถานะ (FILTER BY STATUS BUTTON)
  #---------------------------------------------------------------------------
  # ใช้สลับสถานะธุรกรรมที่ต้องการดู

  filter-status:
    # ประเภทปุ่ม - จัดการการกรองตามสถานะธุรกรรม
    type: ZAUCTIONHOUSE_ADMIN_TRANSACTIONS_FILTER_STATUS

    slot: 47

    # รูปแบบข้อความของสถานะที่ถูกเลือกอยู่ในตอนนี้
    enable-text: ' #F27438➜ %status%'

    # รูปแบบข้อความของสถานะที่ไม่ได้ถูกเลือก
    disable-text: ' #76CDCD➜ %status%'

    # ชื่อที่ใช้แสดงสำหรับตัวเลือก "ทุกสถานะ" (All statuses)
    all-statuses-name: "All"

    # สถานะธุรกรรมที่สามารถเลือกกรองได้
    statuses:
      - PENDING    # ยังไม่ได้กดรับเงิน
      - RETRIEVED  # รับเงินแล้ว

    # ชื่อแสดงผลของแต่ละสถานะ
    status-names:
      PENDING: "Pending"
      RETRIEVED: "Retrieved"

    item:
      material: HOPPER
      name: '#2CCED2<bold>กรองตามสถานะ'
      lore:
        - '#92ffffสถานะที่มีให้เลือก:'
        - '%ALL%'
        - '%PENDING%'
        - '%RETRIEVED%'
        - ''
        - '#8c8c8c• #2CCED2คลิก #92ffffเพื่อเปลี่ยนสถานะที่ต้องการกรอง'

  #---------------------------------------------------------------------------
  # ปุ่มกรองตามวันที่ (FILTER BY DATE BUTTON)
  #---------------------------------------------------------------------------
  # ใช้สลับช่วงวันที่ของธุรกรรมที่ต้องการดู

  filter-date:
    # ประเภทปุ่ม - จัดการการกรองตามวันที่
    type: ZAUCTIONHOUSE_ADMIN_TRANSACTIONS_FILTER_DATE

    slot: 51

    # รูปแบบข้อความสำหรับช่วงวันที่ที่ถูกเลือกอยู่ในตอนนี้
    enable-text: ' #F27438➜ %date%'

    # รูปแบบข้อความสำหรับช่วงวันที่ที่ไม่ได้ถูกเลือก
    disable-text: ' #76CDCD➜ %date%'

    # ตัวเลือกช่วงวันที่ที่มีให้ใช้
    filters:
      - ALL         # ทั้งหมด
      - TODAY       # เฉพาะวันนี้
      - THIS_WEEK   # 7 วันที่ผ่านมา
      - THIS_MONTH  # 30 วันที่ผ่านมา
      - THIS_YEAR   # 365 วันที่ผ่านมา

    # ชื่อแสดงผลของแต่ละช่วงวันที่
    filter-names:
      ALL: "All Time"
      TODAY: "Today"
      THIS_WEEK: "This Week"
      THIS_MONTH: "This Month"
      THIS_YEAR: "This Year"

    item:
      material: CLOCK
      name: '#2CCED2<bold>กรองตามวันที่'
      lore:
        - '#92ffffตัวเลือกช่วงวันที่:'
        - '%ALL%'
        - '%TODAY%'
        - '%THIS_WEEK%'
        - '%THIS_MONTH%'
        - '%THIS_YEAR%'
        - ''
        - '#8c8c8c• #2CCED2คลิก #92ffffเพื่อเปลี่ยนตัวกรองวันที่'