################################################################################################################################
#
#   zAuctionHouse V4 - Admin Expired Items Inventory
#
#   Inventory นี้ใช้สำหรับให้แอดมินดูและจัดการไอเทมหมดอายุ (expired items) ของผู้เล่น
#   แอดมินสามารถดึงไอเทมคืนให้ผู้เล่นในกรณีที่ผู้เล่นเข้าไปกดรับเองไม่ได้
#
#   ADMIN ACTIONS:
#   - ดูไอเทมหมดอายุทั้งหมดของผู้เล่นเป้าหมาย
#   - ดึงไอเทมออกมาเพื่อนำไปคืนให้ผู้เล่น
#   - มีประโยชน์เวลาใช้กู้ไอเทมหลังจากที่ผู้เล่นแจ้งปัญหา/ร้องเรียน
#
#   ACCESS:
#   - เปิดจากหน้า admin history main → ปุ่ม Expired Items
#   - /ah admin open expired <player>
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าสูงสุด
name: '#0c1719Admin expired items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า admin history main
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมหมดอายุ (EXPIRED ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมหมดอายุทั้งหมดของผู้เล่นเป้าหมาย
  # เมื่อคลิกที่ไอเทม แอดมินจะทำการดึงไอเทมนั้นออกมา (action ของแอดมิน)

  items:
    # ประเภทปุ่ม - ใช้แสดง expired items ของแอดมิน พร้อมความสามารถในการดึงไอเทม
    type: ZAUCTIONHOUSE_ADMIN_EXPIRED_ITEMS

    # ช่องสำหรับแสดงไอเทมหมดอายุ (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # กรณีไม่มีไอเทมหมดอายุเลย
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nไม่พบไอเทมหมดอายุ'