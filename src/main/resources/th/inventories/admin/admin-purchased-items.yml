################################################################################################################################
#
#   zAuctionHouse V4 - Admin Purchased Items Inventory
#
#   Inventory นี้ใช้สำหรับให้แอดมินดูและจัดการไอเทมที่ผู้เล่นเคยซื้อ (purchased items)
#   แอดมินสามารถดึงไอเทมคืนให้ผู้เล่นในกรณีที่ผู้เล่นเข้าไปกดรับเองไม่ได้
#
#   ADMIN ACTIONS:
#   - ดูไอเทมที่ผู้เล่นเป้าหมายเคยซื้อทั้งหมด
#   - ดึงไอเทมออกมาเพื่อนำไปคืนให้ผู้เล่น
#   - มีประโยชน์เวลาใช้กู้ไอเทมหลังจากที่ผู้เล่นแจ้งปัญหา/ร้องเรียน
#
#   ACCESS:
#   - เปิดจากหน้า admin history main → ปุ่ม Purchased Items
#   - /ah admin open purchased <player>
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าสูงสุด
name: '#0c1719Admin purchased items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า admin history main
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมที่เคยซื้อ (PURCHASED ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมที่ผู้เล่นเป้าหมายเคยซื้อทั้งหมด
  # เมื่อคลิกที่ไอเทม แอดมินจะทำการดึงไอเทมนั้นออกมา (action ของแอดมิน)

  items:
    # ประเภทปุ่ม - ใช้แสดง purchased items ของแอดมิน พร้อมความสามารถในการดึงไอเทม
    type: ZAUCTIONHOUSE_ADMIN_PURCHASED_ITEMS

    # ช่องสำหรับแสดงไอเทมที่เคยซื้อ (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # กรณีไม่มีไอเทมที่เคยซื้อเลย
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nไม่พบไอเทมที่เคยซื้อ'