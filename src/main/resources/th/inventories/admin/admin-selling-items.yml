################################################################################################################################
#
#   zAuctionHouse V4 - Admin Selling Items Inventory
#
#   Inventory นี้ใช้สำหรับให้แอดมินดูและจัดการไอเทมที่ผู้เล่นกำลังลงขายอยู่ (active listings)
#   แอดมินสามารถถอดไอเทมออกจากการขายแทนผู้เล่นได้
#
#   ADMIN ACTIONS:
#   - ดูไอเทมทั้งหมดที่ผู้เล่นเป้าหมายกำลังลงขายอยู่
#   - ถอดไอเทมออกจากการขาย (ยกเลิกประกาศ)
#   - ใช้ลบประกาศที่ไม่เหมาะสม หรือที่เป็นสแกม
#
#   ACCESS:
#   - เปิดจากหน้า admin history main → ปุ่ม Sale Items
#   - /ah admin open selling <player>
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าสูงสุด
# หมายเหตุ: ชื่อใช้คำว่า "listed" แต่ type ใช้ "selling" เพื่อให้สอดคล้องกัน
name: '#0c1719Admin listed items (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า admin history main
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงไอเทมที่กำลังขาย (SELLING ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมทั้งหมดที่ผู้เล่นเป้าหมายกำลังลงขายอยู่
  # เมื่อคลิกที่ไอเทม แอดมินจะถอดไอเทมนั้นออกจากการขาย (action ของแอดมิน)

  items:
    # ประเภทปุ่ม - ใช้แสดง selling items ของแอดมิน พร้อมความสามารถในการถอดออกจากการขาย
    type: ZAUCTIONHOUSE_ADMIN_SELLING_ITEMS

    # ช่องสำหรับแสดงไอเทมที่กำลังขาย (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # กรณีไม่มีไอเทมที่กำลังลงขายเลย
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nไม่พบไอเทมที่กำลังขายอยู่'