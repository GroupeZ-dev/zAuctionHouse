################################################################################################################################
#
#   zAuctionHouse V4 - Purchase Confirmation Inventory
#
#   inventory นี้ใช้สำหรับให้ผู้เล่น "ยืนยัน" การซื้อ ก่อนที่จะทำการซื้อจริง
#   จะแสดงไอเทมที่จะซื้อ พร้อมปุ่มยืนยัน / ยกเลิก
#
#   ฟีเจอร์:
#   - ดูตัวอย่างไอเทมก่อนซื้อ
#   - ดูของด้านใน Shulker (ถ้ามี)
#   - ยืนยันหรือยกเลิกการซื้อได้อย่างชัดเจน
#
#   การเปิดใช้งาน:
#   - เปิดขึ้นมาอัตโนมัติเมื่อผู้เล่นคลิกซื้อไอเทมในตลาด (auction house)
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# การตั้งค่า INVENTORY
#=============================================================================

# ชื่อ inventory - ใช้รูปแบบคำถามให้เข้าใจง่าย
name: "#0c1719ต้องการซื้อไอเทมชิ้นนี้หรือไม่?"

# ขนาด inventory - 3 แถว (27 ช่อง) ใช้เป็นหน้าต่างยืนยันแบบกะทัดรัด
size: 27

#=============================================================================
# ไอเทมภายใน inventory
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # ปุ่มยืนยันการซื้อ (CONFIRM BUTTON)
  #---------------------------------------------------------------------------
  # เมื่อกดจะทำการซื้อ และโอนเงิน/ไอเทมให้เรียบร้อย

  confirm:
    # ประเภทปุ่ม - จัดการการยืนยันการซื้อให้โดยอัตโนมัติ
    type: ZAUCTIONHOUSE_CONFIRM_PURCHASE

    item:
      # กระจกสีเขียว ใช้แทนปุ่มยืนยันการซื้อ
      material: GREEN_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ซื้อ"
      lore:
        - "#92ffffยืนยันการซื้อไอเทมนี้"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อยืนยันการซื้อ"

    # ใช้หลายช่องเพื่อให้พื้นที่คลิกกว้างขึ้น
    # จัดไว้ฝั่งซ้ายของ inventory (กริด 3×3)
    slots:
      - 0-2     # แถวบนซ้าย
      - 9-11    # แถวกลางซ้าย
      - 18-20   # แถวล่างซ้าย

  #---------------------------------------------------------------------------
  # ปุ่มยกเลิก / กลับ (CANCEL/BACK BUTTON)
  #---------------------------------------------------------------------------
  # ยกเลิกการซื้อ และกลับไปยังเมนูก่อนหน้า (auction house)

  deny:
    # ประเภทปุ่ม - ใช้สำหรับย้อนกลับไป inventoryก่อนหน้า
    type: BACK

    item:
      # กระจกสีแดง ใช้แทนปุ่มยกเลิก
      material: RED_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ย้อนกลับ"
      lore:
        - "#92ffffกลับไปยังหน้าก่อนหน้า"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อย้อนกลับ"

    # จัดไว้ฝั่งขวาของ inventory (กริด 3×3)
    slots:
      - 6-8     # แถวบนขวา
      - 15-17   # แถวกลางขวา
      - 24-26   # แถวล่างขวา

  #---------------------------------------------------------------------------
  # ช่องตกแต่ง (DECORATION)
  #---------------------------------------------------------------------------
  # เติมกระจกในคอลัมน์ตรงกลางเพื่อให้ UI ดูเรียบร้อย

  decoration:
    item:
      material: LIGHT_BLUE_STAINED_GLASS_PANE
      name: "#2CCED2"

    # ช่องส่วนตรงกลางและรอบ ๆ
    slots:
      - 3-5     # ด้านบนตรงกลาง
      - 12      # กลางซ้ายของส่วนกลาง
      - 14      # กลางขวาของส่วนกลาง
      - 21-23   # ด้านล่างตรงกลาง

  #---------------------------------------------------------------------------
  # ช่องแสดงไอเทมที่จะซื้อ (ITEM PREVIEW)
  #---------------------------------------------------------------------------
  # แสดงไอเทมที่ผู้เล่นกำลังจะซื้อไว้ตรงกลาง

  show:
    # ประเภทปุ่ม - ใช้สำหรับแสดงไอเทมจากตลาด
    type: ZAUCTIONHOUSE_SHOW

    # ช่องตรงกลาง inventory
    slot: 13

  #---------------------------------------------------------------------------
  # ปุ่มดูของข้างใน Shulker (SHULKER CONTENT BUTTON)
  #---------------------------------------------------------------------------
  # เปิดหน้าดูของด้านใน shulker (จะแสดงเฉพาะเมื่อไอเทมเป็น shulker)

  shulker:
    # ประเภทปุ่ม - เปิดดูของด้านใน shulker
    # จะแสดงเฉพาะเมื่อไอเทมมี shulker อยู่ด้านใน
    type: ZAUCTIONHOUSE_SHULKER_OPEN

    # ตำแหน่งช่อง
    slot: 4

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>ดูของด้านใน sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffดูเนื้อหาภายในกล่อง shulker"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อดูของด้านใน"