################################################################################################################################
#
#   zAuctionHouse V4 - Bulk Purchase Confirmation Inventory
#
#   inventory นี้ใช้สำหรับยืนยันการซื้อไอเทมหลายชิ้นพร้อมกัน (bulk sales)
#   จะแสดงไอเทมทั้งหมดในชุดให้ดูเป็นตัวอย่างก่อนกดยืนยันซื้อ
#
#   ฟีเจอร์:
#   - ดูตัวอย่างไอเทมทั้งหมดในชุดขาย (bulk sale)
#   - ดูของด้านใน Shulker (ถ้ามี)
#   - กดเพียงครั้งเดียวเพื่อยืนยันการซื้อไอเทมทั้งหมด
#
#   การเข้าถึง:
#   - เปิดขึ้นอัตโนมัติเมื่อคลิกซื้อไอเทมแบบชุดใหญ่
#   - ไอเทมแบบชุดใหญ่จะแสดงด้วยไอคอนหีบในหน้าตลาด
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# การตั้งค่า INVENTORY
#=============================================================================

# ชื่อ inventory - ใช้รูปแบบคำถาม และใช้คำว่า "items" แบบพหูพจน์
name: "#0c1719ต้องการซื้อไอเทมเหล่านี้หรือไม่ ?"

# ขนาด inventory - 6 แถว เพื่อแสดงไอเทมในชุดขายได้ครบ
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'

#=============================================================================
# ไอเทมภายใน inventory
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงเนื้อหาชุดไอเทม (BULK ITEM CONTENT DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมทั้งหมดที่อยู่ในชุดขาย
  # เป็นไอเทมแสดงตัวอย่างเท่านั้น (ผู้เล่นหยิบออกทีละชิ้นไม่ได้)

  item-content:
    # ประเภทปุ่ม - แสดงไอเทมทั้งหมดในชุดขาย
    type: ZAUCTIONHOUSE_ITEM_CONTENT

    # ช่องสำหรับแสดงไอเทม (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-44

  #---------------------------------------------------------------------------
  # ปุ่มยืนยันการซื้อ (CONFIRM BUTTON)
  #---------------------------------------------------------------------------
  # ยืนยันการซื้อไอเทมทั้งหมดในชุดนี้

  confirm:
    type: ZAUCTIONHOUSE_CONFIRM_PURCHASE

    item:
      material: GREEN_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ซื้อ"
      lore:
        - "#92ffffยืนยันการซื้อไอเทมทั้งหมดในชุดนี้"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อยืนยันการซื้อ"

    # พื้นที่ด้านล่างซ้าย (3 ช่อง)
    slots:
      - 46-48

  #---------------------------------------------------------------------------
  # ปุ่มยกเลิก / กลับ (CANCEL/BACK BUTTON)
  #---------------------------------------------------------------------------
  # ยกเลิกและกลับไปยังหน้าตลาด

  deny:
    type: BACK

    item:
      material: RED_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ย้อนกลับ"
      lore:
        - "#92ffffกลับไปยังหน้าก่อนหน้า"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อย้อนกลับ"

    # พื้นที่ด้านล่างขวา (3 ช่อง)
    slots:
      - 50-52

  #---------------------------------------------------------------------------
  # ปุ่มดูของด้านใน Shulker (SHULKER CONTENT BUTTON)
  #---------------------------------------------------------------------------
  # เปิดหน้าดูของด้านใน Shulker

  shulker:
    type: ZAUCTIONHOUSE_SHULKER_OPEN

    # ตรงกลางของแถวล่างสุด
    slot: 49

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>ดูของด้านใน sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffดูเนื้อหาภายในกล่อง shulker"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อดูของด้านใน"