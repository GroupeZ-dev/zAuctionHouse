################################################################################################################################
#
#   zAuctionHouse V4 - Remove Listing Confirmation  Inventory 
#
#   inventory นี้ใช้สำหรับให้ผู้ขาย "ยืนยัน" การถอดไอเทมออกจากการขาย
#   ไอเทมจะถูกย้ายกลับไปยังหมวดไอเทมหมดอายุ (expired items) ของผู้เล่น
#
#   ฟีเจอร์:
#   - ดูตัวอย่างไอเทมก่อนถอดประกาศ
#   - ดูของด้านใน Shulker (ถ้ามี)
#   - ยืนยันหรือยกเลิกการถอดประกาศขาย
#
#   การเข้าถึง:
#   - เปิดขึ้นอัตโนมัติเมื่อผู้ขายคลิกไอเทมที่ตัวเองลงขาย
#   - จะแสดงก็ต่อเมื่อ open-confirm-inventory เป็น true ใน config.yml
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# การตั้งค่า  INVENTORY 
#=============================================================================

# ชื่อ inventory  - ใช้รูปแบบคำถามให้เข้าใจง่าย
name: "#0c1719ต้องการลบไอเทมนี้ออกจากการขายหรือไม่?"

# ขนาด inventory  - 3 แถว (27 ช่อง) เป็นหน้าต่างยืนยันแบบกะทัดรัด
size: 27

#=============================================================================
# ไอเทมภายใน inventory 
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # ปุ่มยืนยันการถอดประกาศ (CONFIRM REMOVE BUTTON)
  #---------------------------------------------------------------------------
  # ถอดไอเทมออกจากการขาย และย้ายไปยังหมวด expired items

  remove:
    # ประเภทปุ่ม - จัดการการถอดประกาศขาย
    type: ZAUCTIONHOUSE_CONFIRM_REMOVE_LISTED

    item:
      # กระจกสีเขียว ใช้แทนปุ่มยืนยันการถอดประกาศ
      material: GREEN_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ʀᴇᴍᴏᴠᴇ"
      lore:
        - "#92ffffถอดไอเทมนี้ออกจากการขาย"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อถอดประกาศขาย"

    # ฝั่งซ้ายของ inventory  (กริด 3×3)
    slots:
      - 0-2     # แถวบนซ้าย
      - 9-11    # แถวกลางซ้าย
      - 18-20   # แถวล่างซ้าย

  #---------------------------------------------------------------------------
  # ปุ่มยกเลิก / กลับ (CANCEL/BACK BUTTON)
  #---------------------------------------------------------------------------
  # ยกเลิกการถอดประกาศ และกลับไปยังหน้าตลาด

  deny:
    # ประเภทปุ่ม - ย้อนกลับไปยัง inventory ก่อนหน้า
    type: BACK

    item:
      # กระจกสีแดง ใช้แทนปุ่มยกเลิก
      material: RED_STAINED_GLASS_PANE
      name: "#2CCED2<bold>ʙᴀᴄᴋ"
      lore:
        - "#92ffffกลับไปยังหน้าก่อนหน้า"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อย้อนกลับ"

    # ฝั่งขวาของ inventory  (กริด 3×3)
    slots:
      - 6-8     # แถวบนขวา
      - 15-17   # แถวกลางขวา
      - 24-26   # แถวล่างขวา

  #---------------------------------------------------------------------------
  # ช่องตกแต่ง (DECORATION)
  #---------------------------------------------------------------------------
  # เติมช่องตรงกลางด้วยกระจกให้ UI ดูเรียบร้อย

  decoration:
    item:
      material: LIGHT_BLUE_STAINED_GLASS_PANE
      name: "#2CCED2"

    # ช่องคอลัมน์กลางและรอบ ๆ
    slots:
      - 3-5     # ด้านบนตรงกลาง
      - 12      # กลางซ้ายของส่วนกลาง
      - 14      # กลางขวาของส่วนกลาง
      - 21-23   # ด้านล่างตรงกลาง

  #---------------------------------------------------------------------------
  # ช่องแสดงไอเทม (ITEM PREVIEW)
  #---------------------------------------------------------------------------
  # แสดงไอเทมที่กำลังจะถูกถอดประกาศขายไว้ตรงกลาง

  show:
    # ประเภทปุ่ม - ใช้แสดงไอเทมในตลาด
    type: ZAUCTIONHOUSE_SHOW

    # ช่องตรงกลางของ inventory 
    slot: 13

  #---------------------------------------------------------------------------
  # ปุ่มดูของด้านใน Shulker (SHULKER CONTENT BUTTON)
  #---------------------------------------------------------------------------
  # เปิดหน้าดูของด้านใน Shulker (จะแสดงเฉพาะเมื่อไอเทมเป็น Shulker)

  shulker:
    # ประเภทปุ่ม - เปิดดูเนื้อหาของ Shulker
    type: ZAUCTIONHOUSE_SHULKER_OPEN

    slot: 4

    item:
      material: SHULKER_BOX
      name: "#2CCED2<bold>ดูของด้านใน sʜᴜʟᴋᴇʀ"
      lore:
        - "#92ffffดูเนื้อหาภายในกล่อง shulker"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อดูของด้านใน"