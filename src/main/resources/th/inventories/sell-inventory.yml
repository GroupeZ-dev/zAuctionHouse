################################################################################################################################
#
#   zAuctionHouse V4 - Sell Inventory
#
#   Inventory นี้ใช้สำหรับให้ผู้เล่นลงขายไอเทมผ่าน GUI
#   เปิดใช้งานได้ผ่าน /ah sell (เมื่อ enable-sell-inventory เป็น true ใน config.yml)
#
#   FEATURES:
#   - เลือกไอเทมจากกระเป๋าเพื่อเอามาลงขาย
#   - ปรับราคาได้ด้วยปุ่มเพิ่ม/ลดราคา
#   - เลือกประเภทเศรษฐกิจ (economy) ได้ ถ้ามีมากกว่าหนึ่งแบบ
#   - ยืนยันหรือยกเลิกการลงขายได้จากเมนูเดียว
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory
name: "#0c1719Sell Item"

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # พื้นที่แสดงไอเทม (ITEM DISPLAY AREA)
  #---------------------------------------------------------------------------
  # แสดงไอเทมที่ถูกเลือกเพื่อนำมาลงขาย
  # ผู้เล่นสามารถคลิกไอเทมในกระเป๋าเพื่อเพิ่มเข้ามาในส่วนนี้

  show-item:
    # ประเภทปุ่ม - จัดการการเลือกและแสดงไอเทม
    type: ZAUCTIONHOUSE_SELL_SHOW_ITEM

    # ช่องที่ใช้แสดงไอเทมที่เลือกไว้
    # ครอบคลุมพื้นที่กลางทั้งหมด (36 ช่อง)
    slots:
      - 9-44

    # ช่องที่ใช้แสดง placeholder เมื่อยังไม่มีการเลือกไอเทม
    empty-slot: 22

    # ไอเทม placeholder เมื่อยังไม่ได้เลือกไอเทมใดเลย
    item:
      material: BARRIER
      name: "#ff0000<bold>ไม่มีไอเทมที่เลือก"
      lore:
        - ""
        - "#8c8c8cถือไอเทมไว้ในมือ"
        - "#8c8c8cหรือเลือกไอเทมจาก inventory ของคุณ"

  #---------------------------------------------------------------------------
  # ปุ่มยกเลิก (CANCEL BUTTON)
  #---------------------------------------------------------------------------
  # ยกเลิกการลงขาย และคืนไอเทมทั้งหมดให้ผู้เล่น

  cancel:
    # ประเภทปุ่ม - จัดการการยกเลิกและคืนไอเทม
    type: ZAUCTIONHOUSE_SELL_CANCEL

    # ตำแหน่งช่อง - ซ้ายสุดของแถวล่าง
    slot: 45

    item:
      # กระจกแดงสื่อถึงการยกเลิก/การกระทำที่ต้องระวัง
      material: RED_STAINED_GLASS_PANE
      name: "#ff0000<bold>ยกเลิก"
      lore:
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อยกเลิกและรับไอเทมคืน"

  #---------------------------------------------------------------------------
  # ปุ่มลดราคา (DECREASE PRICE BUTTON)
  #---------------------------------------------------------------------------
  # ลดราคาประกาศขาย ด้วยจำนวนที่ต่างกันตามวิธีการคลิก

  private-decrease:
    # ประเภทปุ่ม - จัดการการปรับราคา
    type: ZAUCTIONHOUSE_SELL_PRICE

    # ตำแหน่งช่อง
    slot: 48

    # จำนวนเงินที่ใช้ปรับราคาตามรูปแบบการคลิก
    # ค่าเป็นลบ = ลดราคา
    amounts:
      left-click: -500         # คลิกปกติ: -500
      right-click: -100        # คลิกขวา: -100
      shift-left-click: -1000  # Shift + คลิกซ้าย: -1000
      shift-right-click: -2500 # Shift + คลิกขวา: -2500

    item:
      # เท็กซ์เจอร์สัญลักษณ์ลบสีแดง
      url: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvOTM1ZTRlMjZlYWZjMTFiNTJjMTE2NjhlMWQ2NjM0ZTdkMWQwZDIxYzQxMWNiMDg1ZjkzOTQyNjhlYjRjZGZiYSJ9fX0=
      name: "#ff3333-1,000"
      lore:
        - ""
        # %price% = ราคาปัจจุบันของประกาศขาย
        - "<white>ราคาปัจจุบัน#8c8c8c: #2CCED2%price%"
        - ""
        - "#8c8c8c• #92ffffคลิกซ้าย#8c8c8c: -500"
        - "#8c8c8c• #92ffffคลิกขวา#8c8c8c: -100"
        - "#8c8c8c• #92ffffนั่ง+คลิกซ้าย#8c8c8c: -1,000"
        - "#8c8c8c• #92ffffนั่ง+คลิกขวา#8c8c8c: -2,500"

  #---------------------------------------------------------------------------
  # ปุ่มเลือกเศรษฐกิจ (ECONOMY SELECTOR)
  #---------------------------------------------------------------------------
  # ใช้สลับ economy ที่จะใช้ลงขาย
  # มีประโยชน์เมื่อเซิร์ฟเวอร์มีหลาย economy

  select-economy:
    # ประเภทปุ่ม - จัดการการสลับ economy
    type: ZAUCTIONHOUSE_SELL_ECONOMY

    # ตำแหน่งช่อง - กึ่งกลางของแถวล่าง
    slot: 49

    item:
      # เท็กซ์เจอร์เหรียญทอง
      url: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNGU3NGQ2NDcyZjgxMWVlN2U1ZTgwNWVhOTNkN2I0Yzc2MWM2NmE2NGU1OTM3MDJmYzgwNzNkYjM1N2YwNDY0ZCJ9fX0=
      name: "#ffd700<bold>สกุลเงิน"
      lore:
        - ""
        # %economy% = ชื่อ economy ที่เลือกอยู่ตอนนี้
        - "<white>สกุลเงินปัจจุบัน#8c8c8c: #2CCED2%economy%"
        - ""
        - "#8c8c8c• #92ffffคลิกซ้าย#8c8c8c: ไปสกุลเงินถัดไป"
        - "#8c8c8c• #92ffffคลิกขวา#8c8c8c: กลับไปสกุลเงินก่อนหน้า"

  #---------------------------------------------------------------------------
  # ปุ่มเพิ่มราคา (INCREASE PRICE BUTTON)
  #---------------------------------------------------------------------------
  # เพิ่มราคาประกาศขาย ด้วยจำนวนที่ต่างกันตามวิธีการคลิก

  price-increase:
    # ประเภทปุ่ม - จัดการการปรับราคา
    type: ZAUCTIONHOUSE_SELL_PRICE

    # จำนวนเงินที่ใช้ปรับราคาตามรูปแบบการคลิก
    # ค่าเป็นบวก = เพิ่มราคา
    amounts:
      left-click: 500         # คลิกปกติ: +500
      right-click: 100        # คลิกขวา: +100
      shift-left-click: 1000  # Shift + คลิกซ้าย: +1000
      shift-right-click: 2500 # Shift + คลิกขวา: +2500

    # ตำแหน่งช่อง
    slot: 50

    item:
      # เท็กซ์เจอร์สัญลักษณ์บวกสีเขียว
      url: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvOWEyZDg5MWM2YWU5ZjZiYWEwNDBkNzM2YWI4NGQ0ODM0NGJiNmI3MGQ3ZjFhMjgwZGQxMmNiYWM0ZDc3NyJ9fX0=
      name: '#00cc00+1,000'
      lore:
        - '<white>ราคาปัจจุบัน#8c8c8c: #2CCED2%price%'
        - ''
        - '#8c8c8c• #92ffffคลิกซ้าย#8c8c8c: +500'
        - '#8c8c8c• #92ffffคลิกขวา#8c8c8c: +100'
        - '#8c8c8c• #92ffffนั่ง+คลิกซ้าย#8c8c8c: +1,000'
        - '#8c8c8c• #92ffffนั่ง+คลิกขวา#8c8c8c: +2,500'

  #---------------------------------------------------------------------------
  # ปุ่มยืนยันลงขาย (CONFIRM BUTTON)
  #---------------------------------------------------------------------------
  # ยืนยันการลงขาย และประกาศขายไอเทม

  confirm:
    # ประเภทปุ่ม - จัดการการยืนยันการขาย
    type: ZAUCTIONHOUSE_SELL_CONFIRM

    # ตำแหน่งช่อง - ขวาสุดของแถวล่าง
    slot: 53

    item:
      # กระจกสีเขียวมะนาว สื่อถึงการยืนยัน/การกระทำที่ปลอดภัย
      material: LIME_STAINED_GLASS_PANE
      name: "#00ff00<bold>ยืนยันการขาย"
      lore:
        - ""
        # สรุปรายละเอียดการลงขาย
        - "<white>สกุลเงิน#8c8c8c: #2CCED2%economy%"
        - "<white>ราคา#8c8c8c: #2CCED2%price%"
        - "<white>จำนวนไอเทม#8c8c8c: #2CCED2%item_count%"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อยืนยันการขาย"