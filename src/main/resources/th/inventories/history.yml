################################################################################################################################
#
#   zAuctionHouse V4 - Sales History Inventory
#
#   Inventory นี้ใช้แสดงประวัติการขายของผู้เล่น (sales history)
#   แสดงรายการดีลที่ขายสำเร็จ พร้อมข้อมูลผู้ซื้อและราคาขาย
#
#   FEATURES:
#   - ดูไอเทมทั้งหมดที่คุณเคยขายออกไป
#   - ดูได้ว่าใครเป็นคนซื้อ และซื้อเมื่อไร
#   - เลือกเรียงตามวันที่ ราคา หรือชื่อลูกค้า (buyer)
#   - เก็บประวัติย้อนหลังได้ไม่จำกัด (ตั้งค่าได้ใน config)
#
#   ACCESS:
#   - /ah history
#   - คลิกที่ข้อความแจ้งเตือนตอนเข้าเกม หลังมีการขายระหว่างที่คุณออฟไลน์
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# INVENTORY SETTINGS
#=============================================================================

# ชื่อ inventory พร้อม placeholder สำหรับหน้าปัจจุบัน / หน้าทั้งหมด
name: '#0c1719Sales History (%page%/%max-page%)'

# ขนาด inventory - 6 แถว
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # กรอบกระจกตกแต่งรอบ ๆ
  - 'zauctionhouse-decoration'
  # ปุ่มย้อนหน้า / หน้าถัดไป
  - 'zauctionhouse-pagination'
  # ปุ่มกลับไปหน้า auction หลัก
  - 'zauctionhouse-back'

#=============================================================================
# ITEMS
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # แสดงรายการประวัติการขาย (HISTORY ITEMS DISPLAY)
  #---------------------------------------------------------------------------
  # แสดงไอเทมทั้งหมดที่ขายออกไป พร้อมรายละเอียดดีล
  # มุมมองนี้เป็นแบบ read-only ไม่สามารถกดรับไอเทมกลับมาได้

  items:
    # ประเภทปุ่ม - ใช้แสดงประวัติการขาย
    type: ZAUCTIONHOUSE_HISTORY_ITEMS

    # ช่องสำหรับแสดงสถานะกำลังโหลด ระหว่างดึงข้อมูลประวัติ
    loading-slot: 22

    # ช่องสำหรับแสดงไอเทมในประวัติ (4 แถว × 9 คอลัมน์ = 36 ช่อง)
    slots:
      - 9-17    # แถวที่ 2
      - 18-26   # แถวที่ 3
      - 27-35   # แถวที่ 4
      - 36-44   # แถวที่ 5

    # ไอเทมที่ใช้แสดงระหว่างกำลังโหลดประวัติจากฐานข้อมูล
    item:
      material: BARRIER
      name: "#ff0000กำลังโหลด..."

    # ไอเทมที่ใช้แสดงเมื่อยังไม่มีประวัติการขายเลย
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nไม่พบประวัติการขาย'
        lore:
          - ''
          - '&7คุณยังไม่เคยขายไอเทมใด ๆ'

  #---------------------------------------------------------------------------
  # ปุ่มเปลี่ยนรูปแบบการเรียง (SORT BUTTON)
  #---------------------------------------------------------------------------
  # ใช้เปลี่ยนลำดับการเรียงของรายการประวัติ

  sort:
    # ประเภทปุ่ม - จัดการการวนเปลี่ยนรูปแบบการเรียงของ history
    type: ZAUCTIONHOUSE_HISTORY_SORT

    # ตำแหน่งช่อง
    slot: 51

    # รูปแบบข้อความของตัวเลือกที่ถูกเลือกอยู่ตอนนี้
    enable-text: ' #F27438➜ %sorting%'

    # รูปแบบข้อความของตัวเลือกที่ยังไม่ได้ถูกเลือก
    disable-text: ' #76CDCD➜ %sorting%'

    # รูปแบบการเรียงที่ใช้วนเปลี่ยน (ตามลำดับนี้)
    sorts:
      - DATE_DESC    # วันที่ใหม่สุดก่อน (ค่าเริ่มต้น)
      - DATE_ASC     # วันที่น้อยไปมาก
      - PRICE_DESC   # ราคาสูงสุดก่อน
      - PRICE_ASC    # ราคาต่ำสุดก่อน
      - BUYER_ASC    # ชื่อลูกค้า A-Z
      - BUYER_DESC   # ชื่อลูกค้า Z-A

    # ชื่อที่ใช้แสดงสำหรับแต่ละรูปแบบการเรียง
    sort-names:
      DATE_DESC: "วันล่าสุดมากไปน้อย"
      DATE_ASC: "วันที่น้อยไปมาก"
      PRICE_DESC: "ราคาสูงสุดมากไปน้อย"
      PRICE_ASC: "ราคาต่ำสุดน้อยไปมาก"
      BUYER_ASC: "ชื่อลูกค้า A-Z"
      BUYER_DESC: "ชื่อลูกค้า Z-A"

    item:
      material: HOPPER
      name: "#2CCED2<bold>เรียงลำดับ"
      lore:
        - "#92ffffรูปแบบการเรียงลำดับที่มีให้เลือก:"
        # Placeholder สำหรับแต่ละรูปแบบ (ระบบจะจัดรูปแบบด้วย enable/disable-text)
        - "%DATE_DESC%"
        - "%DATE_ASC%"
        - "%PRICE_DESC%"
        - "%PRICE_ASC%"
        - "%BUYER_ASC%"
        - "%BUYER_DESC%"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อเปลี่ยนรูปแบบการเรียง"