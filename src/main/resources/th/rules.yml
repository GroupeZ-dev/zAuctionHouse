################################################################################################################################
#
#   zAuctionHouse V4 - การตั้งค่า Item Rules
#
#   ไฟล์นี้ใช้กำหนดว่าไอเท็มไหน "สามารถ" หรือ "ไม่สามารถ" ขายบน auction house ได้
#   ใช้ blacklist เพื่อบล็อกไอเท็มบางอย่าง หรือใช้ whitelist เพื่ออนุญาตเฉพาะไอเท็มที่กำหนด
#
#   TIP: คุณสามารถบันทึกไอเท็มเป็น Base64 ได้ด้วยคำสั่ง /zmenu save <item name>
#        จากนั้นนำมาอ้างอิงใน rules เพื่อแมตช์ไอเท็มแบบตรงตัวได้
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# RULE TYPES REFERENCE (อ้างอิงประเภทกฎ)
#=============================================================================
#
# MATERIAL RULES:
#   type: material
#   materials:
#     - DIAMOND
#     - EMERALD
#   อธิบาย: แมตช์ไอเท็มตามประเภท material ของ Minecraft
#
# MATERIAL SUFFIX RULES:
#   type: material-suffix
#   suffixes:
#     - "_SWORD"
#     - "_HELMET"
#   อธิบาย: แมตช์ material ที่ลงท้ายด้วย suffix ที่กำหนด
#
# NAME RULES:
#   type: name
#   mode: CONTAINS | EQUALS | STARTS_WITH | ENDS_WITH | REGEX
#   values:
#     - "Special"
#   อธิบาย: แมตช์ไอเท็มตาม display name
#
# LORE RULES:
#   type: lore
#   mode: CONTAINS | EQUALS | STARTS_WITH | ENDS_WITH | REGEX
#   values:
#     - "Soulbound"
#   อธิบาย: แมตช์ไอเท็มที่มีข้อความเฉพาะใน lore
#
# CUSTOM MODEL DATA RULES:
#   type: custom-model-data
#   values:
#     - 1001
#     - 1002
#   อธิบาย: แมตช์ไอเท็มที่มีค่า CustomModelData ตามที่กำหนด
#
# TAG RULES:
#   type: tag
#   tags:
#     - BLOCKS
#     - ITEMS
#   อธิบาย: แมตช์ไอเท็มด้วย Bukkit/Paper item tags
#
# NBT RULES:
#   type: nbt
#   path: "custom.data.key"
#   value: "expected_value"
#   อธิบาย: แมตช์ไอเท็มที่มีค่า NBT เฉพาะตาม path/value
#
# COMBINATION RULES:
#   type: and
#   rules:
#     - <rule1>
#     - <rule2>
#   อธิบาย: ทุกกฎภายในต้องตรง (AND ทั้งหมด)
#
#   type: or
#   rules:
#     - <rule1>
#     - <rule2>
#   อธิบาย: มีกฎใดกฎหนึ่งตรงก็พอ (OR)

#=============================================================================
# CUSTOM ITEM PLUGIN RULES
#=============================================================================
#
# ประเภทกฎเหล่านี้ใช้สำหรับเชื่อมกับปลั๊กอิน custom item ยอดนิยม
# ไอเท็มจะถูกตรวจด้วย identifier ของปลั๊กอินนั้น ๆ
# รองรับ wildcard (*) สำหรับการแมตช์แบบ pattern
#
# ITEMSADDER:
#   type: itemsadder
#   items:
#     - "namespace:item_id"      # แมตช์แบบตรงตัว
#     - "namespace:*"            # แมตช์ทุกไอเท็มใน namespace นั้น
#
# ORAXEN:
#   type: oraxen
#   items:
#     - "custom_sword"           # แมตช์แบบตรงตัว
#     - "*_armor"                # แมตช์ทุกไอเท็มที่ลงท้ายด้วย "_armor"
#
# NEXO:
#   type: nexo
#   items:
#     - "mythic_blade"
#     - "special_*"              # แมตช์ทุกไอเท็มที่ขึ้นต้นด้วย "special_"
#
# MMOITEMS:
#   type: mmoitems
#   items:
#     - "SWORD:CUTLASS"          # รูปแบบ TYPE:ID
#     - "SWORD:*"                # ทุกไอเท็ม TYPE SWORD
#     - "*:LEGENDARY_ITEM"       # ไอเท็ม ID นี้จากทุก TYPE
#
# EXECUTABLEITEMS:
#   type: executableitems
#   items:
#     - "custom_wand"
#
# ECOITEMS:
#   type: ecoitems
#   items:
#     - "packmaster_tear"
#
# CRUCIBLE (MythicCrucible):
#   type: crucible
#   items:
#     - "mythic_blade"
#
# SLIMEFUN:
#   type: slimefun
#   items:
#     - "ELECTRIC_MOTOR"
#
# HEADDATABASE:
#   type: headdatabase
#   items:
#     - "12345"
#
# NOVA:
#   type: nova
#   items:
#     - "machines:electric_furnace"
#
# DENIZEN:
#   type: denizen
#   items:
#     - "my_custom_script"
#
# ADVANCEDITEMS:
#   type: advanceditems
#   items:
#     - "magic_staff"
#
# CUSTOMCRAFTING (WolfyUtilities):
#   type: customcrafting
#   items:
#     - "mynamespace:custom_item"
#
# ZHEAD:
#   type: zhead
#   items:
#     - "custom_head_id"
#
# MAGICCOSMETICS:
#   type: magiccosmetics
#   items:
#     - "hat_crown"
#
# HMCCOSMETICS:
#   type: hmccosmetics
#   items:
#     - "golden_wings"
#
# ZITEMS:
#   type: zitems
#   items:
#     - "custom_gem"
#
# CRAFTENGINE:
#   type: craftengine
#   items:
#     - "namespace:custom_block"
#
# EXECUTABLEBLOCKS:
#   type: executableblocks
#   items:
#     - "magic_chest"

#=============================================================================
# BLACKLIST CONFIGURATION
#=============================================================================
# ไอเท็มที่แมตช์กับกฎ "ใดก็ได้" ในลิสต์นี้ จะ "ไม่สามารถขาย" บน auction house ได้
# blacklist จะถูกตรวจ "ก่อน" whitelist
# ถ้าไอเท็มไปตรงกับ blacklist แล้ว จะถูกบล็อกทันที ไม่สนใจ whitelist

blacklist:
  # เปิด/ปิดระบบ blacklist
  # ถ้าปิด จะไม่มีไอเท็มไหนถูกบล็อก (ยกเว้นกรณีเปิด whitelist)
  enabled: true

  # รายการกฎที่ใช้กำหนดว่าไอเท็มไหนถูกบล็อก
  # ถ้าไอเท็มแมตช์กับกฎใดกฎหนึ่งในนี้ จะไม่สามารถขายได้
  rules:

    #-------------------------------------------------------------------------
    # ตัวอย่าง: บล็อก bedrock (กันไอเท็มแอดมินถูกนำมาขาย)
    #-------------------------------------------------------------------------
    - type: material
      materials:
        - BEDROCK

    #-------------------------------------------------------------------------
    # ตัวอย่าง: บล็อกไอเท็มที่มีคำว่า "Untradeable" ใน lore
    #           และมี CustomModelData = 1001
    #           (ตัวอย่างนี้โชว์การใช้ type: and เพื่อรวมหลายเงื่อนไข)
    #-------------------------------------------------------------------------
    - type: and
      rules:
        # เงื่อนไขที่ 1: ต้องมีคำว่า "Untradeable" อยู่ใน lore
        - type: lore
          mode: CONTAINS
          values:
            - "Untradeable"
        # เงื่อนไขที่ 2: ต้องมี CustomModelData เป็น 1001
        - type: custom-model-data
          values:
            - 1001

    #=========================================================================
    # ตัวอย่างการใช้กับปลั๊กอิน custom item ต่าง ๆ
    #=========================================================================
    # ให้ uncomment (เอา # ออก) แล้วแก้ค่าให้ตรงกับเซิร์ฟเวอร์ของคุณ
    # แต่ละบล็อกจะบอกชื่อปลั๊กอินและตัวอย่างรูปแบบที่ใช้บ่อย
    #
    #-------------------------------------------------------------------------
    # ItemsAdder - บล็อกไอเท็มจาก ItemsAdder
    #-------------------------------------------------------------------------
    # - type: itemsadder
    #   items:
    #     - "namespace:item_id"       # บล็อกไอเท็มตัวนี้
    #     - "namespace:*"             # บล็อกทุกไอเท็มใน namespace นี้
    #     - "mynamespace:rare_*"      # บล็อกไอเท็มที่ขึ้นต้นด้วย "rare_"
    #
    #-------------------------------------------------------------------------
    # Oraxen - บล็อกไอเท็มจาก Oraxen
    #-------------------------------------------------------------------------
    # - type: oraxen
    #   items:
    #     - "custom_sword"            # บล็อกไอเท็มนี้
    #     - "*_armor"                 # บล็อกทุกไอเท็มที่ลงท้ายด้วย "_armor"
    #     - "event_*"                 # บล็อกทุกไอเท็ม event
    #
    #-------------------------------------------------------------------------
    # Nexo - บล็อกไอเท็มจาก Nexo
    #-------------------------------------------------------------------------
    # - type: nexo
    #   items:
    #     - "mythic_blade"
    #     - "special_*"               # บล็อกไอเท็มที่ขึ้นต้นด้วย "special_"
    #     - "*_soulbound"             # บล็อกไอเท็มที่ลงท้ายด้วย "_soulbound"
    #
    #-------------------------------------------------------------------------
    # MMOItems - บล็อกไอเท็มจาก MMOItems (ฟอร์แมต TYPE:ID)
    #-------------------------------------------------------------------------
    # - type: mmoitems
    #   items:
    #     - "SWORD:CUTLASS"           # บล็อกดาบตัวนี้
    #     - "SWORD:*"                 # บล็อกดาบทุกชนิด
    #     - "*:LEGENDARY_ITEM"        # บล็อก ID นี้ในทุก TYPE
    #     - "TOOL:*"                  # บล็อก tool ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # ExecutableItems - บล็อกไอเท็มจาก ExecutableItems
    #-------------------------------------------------------------------------
    # - type: executableitems
    #   items:
    #     - "custom_wand"
    #     - "voucher_*"               # บล็อกทุก voucher
    #     - "admin_*"                 # บล็อกไอเท็มแอดมินทั้งหมด
    #
    #-------------------------------------------------------------------------
    # EcoItems - บล็อกไอเท็มจาก EcoItems
    #-------------------------------------------------------------------------
    # - type: ecoitems
    #   items:
    #     - "packmaster_tear"
    #     - "charm_*"                 # บล็อก charm ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # MythicCrucible - บล็อกไอเท็มจาก MythicCrucible
    #-------------------------------------------------------------------------
    # - type: crucible
    #   items:
    #     - "mythic_blade"
    #     - "dungeon_*"               # บล็อกของดรอป dungeon ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # Slimefun - บล็อกไอเท็มจาก Slimefun
    #-------------------------------------------------------------------------
    # - type: slimefun
    #   items:
    #     - "ELECTRIC_MOTOR"
    #     - "*_INGOT"                 # บล็อก custom ingot ทั้งหมด
    #     - "CARGO_*"                 # บล็อกไอเท็ม cargo ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # HeadDatabase - บล็อกหัวจาก HeadDatabase
    #-------------------------------------------------------------------------
    # - type: headdatabase
    #   items:
    #     - "12345"                   # บล็อกหัว ID นี้
    #     - "123*"                    # บล็อกหัวที่ ID ขึ้นต้นด้วย 123
    #
    #-------------------------------------------------------------------------
    # Nova - บล็อกไอเท็มจาก Nova
    #-------------------------------------------------------------------------
    # - type: nova
    #   items:
    #     - "machines:electric_furnace"
    #     - "machines:*"              # บล็อกไอเท็มทั้งหมดจาก addon machines
    #     - "*:solar_panel"           # บล็อก solar_panel จากทุก addon
    #
    #-------------------------------------------------------------------------
    # Denizen - บล็อกไอเท็มจาก Denizen script
    #-------------------------------------------------------------------------
    # - type: denizen
    #   items:
    #     - "my_custom_script"
    #     - "*_weapon"                # บล็อก script ที่ลงท้ายด้วย "_weapon"
    #
    #-------------------------------------------------------------------------
    # AdvancedItems - บล็อกไอเท็มจาก AdvancedItems
    #-------------------------------------------------------------------------
    # - type: advanceditems
    #   items:
    #     - "magic_staff"
    #     - "rpg_*"                   # บล็อกไอเท็มสาย RPG ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # CustomCrafting/WolfyUtilities - บล็อก custom item จากปลั๊กอินเหล่านี้
    #-------------------------------------------------------------------------
    # - type: customcrafting
    #   items:
    #     - "mynamespace:custom_item"
    #     - "mynamespace:*"           # บล็อกทุกไอเท็มใน namespace นี้
    #
    #-------------------------------------------------------------------------
    # zHead - บล็อกหัวจาก zHead
    #-------------------------------------------------------------------------
    # - type: zhead
    #   items:
    #     - "custom_head_id"
    #     - "category_*"              # บล็อกหัวทั้งหมวด
    #
    #-------------------------------------------------------------------------
    # MagicCosmetics - บล็อกไอเท็มจาก MagicCosmetics
    #-------------------------------------------------------------------------
    # - type: magiccosmetics
    #   items:
    #     - "hat_crown"
    #     - "backpack_*"              # บล็อก backpack ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # HMCCosmetics - บล็อกไอเท็มจาก HMCCosmetics
    #-------------------------------------------------------------------------
    # - type: hmccosmetics
    #   items:
    #     - "golden_wings"
    #     - "aura_*"                  # บล็อก aura ทั้งหมด
    #
    #-------------------------------------------------------------------------
    # zItems - บล็อกไอเท็มจาก zItems
    #-------------------------------------------------------------------------
    # - type: zitems
    #   items:
    #     - "custom_gem"
    #     - "upgrade_*"               # บล็อกไอเท็มอัปเกรดทั้งหมด
    #
    #-------------------------------------------------------------------------
    # CraftEngine - บล็อกไอเท็มจาก CraftEngine
    #-------------------------------------------------------------------------
    # - type: craftengine
    #   items:
    #     - "namespace:custom_block"
    #     - "namespace:*"             # บล็อกไอเท็มทุกอย่างใน namespace นี้
    #
    #-------------------------------------------------------------------------
    # ExecutableBlocks - บล็อกบล็อกจาก ExecutableBlocks
    #-------------------------------------------------------------------------
    # - type: executableblocks
    #   items:
    #     - "magic_chest"
    #     - "teleporter_*"            # บล็อกบล็อกเทเลพอร์ตทั้งหมด

#=============================================================================
# WHITELIST CONFIGURATION
#=============================================================================
# เมื่อเปิดใช้งาน whitelist แล้ว ไอเท็มที่ "ขายได้" จะต้องแมตช์กับกฎใน whitelist เท่านั้น
# ไอเท็มอื่นทั้งหมดจะถูกบล็อกอัตโนมัติ
# whitelist จะถูกตรวจ "หลังจาก" blacklist
#
# USE CASES (ตัวอย่างการใช้งาน):
# - ทำ auction house เฉพาะประเภท (เช่น ขายเฉพาะ enchanted book)
# - จำกัดไอเท็มที่สามารถเทรดในเซิร์ฟเวอร์ event
# - จำกัดเศรษฐกิจให้หมุนเวียนเฉพาะไอเท็มบางชนิด

whitelist:
  # เปิด/ปิดระบบ whitelist
  # ถ้าปิด: ไอเท็มทุกอย่างจะขายได้ (ยกเว้นที่ถูกบล็อกโดย blacklist)
  # ถ้าเปิด: เฉพาะไอเท็มที่ตรงกับ whitelist rules เท่านั้นที่ขายได้
  enabled: false

  # รายการกฎที่กำหนดว่าไอเท็มไหน "ได้รับอนุญาต" ให้ขาย
  # ไอเท็มต้องแมตช์อย่างน้อย "หนึ่ง" กฎ ถึงจะขายได้
  rules:

    #-------------------------------------------------------------------------
    # ตัวอย่าง: อนุญาตเฉพาะ Nether Star ที่มีคำว่า "Voucher" อยู่ในชื่อ
    # ตัวอย่างนี้จะทำให้ auction house กลายเป็นตลาดขาย voucher โดยเฉพาะ
    #-------------------------------------------------------------------------
    - type: and
      rules:
        # เงื่อนไขที่ 1: ต้องเป็น Nether Star
        - type: material
          materials:
            - NETHER_STAR
        # เงื่อนไขที่ 2: ต้องมีคำว่า "Voucher" อยู่ใน display name
        - type: name
          mode: CONTAINS
          values:
            - "Voucher"

    #-------------------------------------------------------------------------
    # ตัวอย่าง whitelist อื่น ๆ (เอา # ออกถ้าต้องการใช้)
    #-------------------------------------------------------------------------

    # อนุญาตเฉพาะอาวุธ
    # - type: material-suffix
    #   suffixes:
    #     - "_SWORD"
    #     - "_AXE"
    #
    # อนุญาตเฉพาะไอเท็มที่มี lore บางอย่าง (เช่น "Tradeable")
    # - type: lore
    #   mode: CONTAINS
    #   values:
    #     - "Tradeable"
    #
    # อนุญาตเฉพาะ TYPE ของ MMOItems บางประเภท
    # - type: mmoitems
    #   items:
    #     - "WEAPON:*"
    #     - "ARMOR:*"