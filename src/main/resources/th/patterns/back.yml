################################################################################################################################
#
#   zAuctionHouse V4 - Back Button Pattern
#
#   แพทเทิร์นนี้ใช้สำหรับทำปุ่มย้อนกลับ (Back Button) เพื่อกลับไปยัง inventory ก่อนหน้า
#   ใช้ใน sub-menu และหน้า detail ต่าง ๆ เพื่อให้ผู้เล่นกดกลับได้สะดวก
#
#   HOW IT WORKS:
#   - เมื่อคลิกที่ปุ่มย้อนกลับ ผู้เล่นจะถูกส่งกลับไปยัง inventory ที่เปิดอยู่ก่อนหน้านี้
#   - ใช้ประเภทปุ่ม BACK ที่มีอยู่แล้วใน zMenu
#   - ระบบจะจัดการ history ของ inventory ให้อัตโนมัติ
#
#   USAGE:
#   ให้ใส่แพทเทิร์นนี้ในไฟล์ inventory ที่ต้องการปุ่มย้อนกลับ:
#     patterns:
#       - 'zauctionhouse-back'
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

# ชื่อแพทเทิร์น - ใช้อ้างอิงจากไฟล์ inventory อื่น
name: "zauctionhouse-back"

# ขนาด inventory (ต้องตรงกับ inventory ที่ใช้แพทเทิร์นนี้)
# ออกแบบมาสำหรับ 6 แถว (54 slot)
size: 54

# ตั้งค่าปุ่มย้อนกลับ
items:

  #---------------------------------------------------------------------------
  # BACK BUTTON
  #---------------------------------------------------------------------------
  previous:
    # ประเภทปุ่ม - BACK เป็น type ที่มีอยู่ใน zMenu อยู่แล้ว
    # จะพาผู้เล่นกลับไปยัง inventory เดิมที่มาจากก่อนหน้า
    # ใช้ร่วมกับระบบ history ของ inventory ใน zMenu
    type: BACK

    # item แบบ permanent ผู้เล่นจะไม่สามารถย้ายได้
    is-permanent: true

    # ตำแหน่ง slot - ตรงกลางของแถวล่างสุด
    # slot 49 คือช่องตรงกลางของแถวล่างสุดใน inventory ขนาด 54 slot
    slot: 49

    # การตั้งค่า item
    item:
      # ใช้บล็อก BARRIER สำหรับปุ่ม "ปิด" หรือ "ย้อนกลับ" บ่อยครั้ง
      # เครื่องหมาย X สีแดงทำให้ผู้เล่นเข้าใจได้ง่ายว่าเป็นการออก/ย้อนกลับ
      material: BARRIER

      # ชื่อที่แสดง (ใช้ MiniMessage format)
      name: "#2CCED2<bold>ย้อนกลับ"

      # Lore อธิบายการทำงานของปุ่มนี้
      lore:
        - "#92ffffกลับไปหน้าก่อนหน้า"
        - ""
        - "#8c8c8c• #2CCED2คลิก #92ffffเพื่อย้อนกลับ"